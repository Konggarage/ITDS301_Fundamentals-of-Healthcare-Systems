name: hospital-his-fhir

services:
  postgres:
    image: postgres:16-alpine
    container_name: hospital_his_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: his_fhir_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./src/sql/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d his_fhir_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  his:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hospital_his_backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  ui:
    image: node:20-alpine
    container_name: hospital_his_ui
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./ui:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    depends_on:
      his:
        condition: service_started

  pgadmin:
    image: dpage/pgadmin4:9
    container_name: hospital_his_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@hospital.com
      PGADMIN_DEFAULT_PASSWORD: admin1234
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json
      - ./pgadmin/pgpass:/pgpass
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  pgadmin_data: